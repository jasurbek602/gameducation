<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle Game</title>
  <link rel="stylesheet" href="/game2/style.css">
</head>
<body>
<h2>⚔️ Battle</h2>

<div id="yellowTrack" class="track"></div>

<div class="center">
  <p id="turn">Turn: Yellow</p>
  <p id="question"></p>
  <input id="answer" autocomplete="off">
  <button class="butto" onclick="check()">OK</button>
</div>

<div id="whiteTrack" class="track"></div>

<script>
let yPos = 0;
let wPos = 0;
let turn = "yellow";
let a,b;

function createTrack(id){
  let track = document.getElementById(id);
  for(let i=0;i<15;i++){
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.style.transform = "scale("+(1 - i*0.03)+")";
    track.appendChild(cell);
  }
}

createTrack("yellowTrack");
createTrack("whiteTrack");

function updateUI(){
  let yCells = document.getElementById("yellowTrack").children;
  let wCells = document.getElementById("whiteTrack").children;

  for(let i=0;i<15;i++){
    yCells[i].className = "cell";
    wCells[i].className = "cell";
  }

  yCells[yPos].classList.add("yellow");
  wCells[wPos].classList.add("white");

  if(turn=="yellow"){
    yCells[yPos].classList.add("active");
  } else {
    wCells[wPos].classList.add("active");
  }

  document.getElementById("turn").innerText = "Turn: " + turn;
}

function newQ(){
  a = Math.floor(Math.random()*20);
  b = Math.floor(Math.random()*20);
  document.getElementById("question").innerText = a+" + "+b;
}

function check(){
  let ans = document.getElementById("answer").value;

  if(ans == a+b){
    if(turn=="yellow") yPos++;
    else wPos++;
  }

  if(yPos >= 14){
    alert("🏆 Yellow WIN");
    reset();
  }

  if(wPos >= 14){
    alert("🏆 White WIN");
    reset();
  }

  turn = (turn=="yellow") ? "white" : "yellow";
  updateUI();
  newQ();
}

function reset(){
  yPos = 0;
  wPos = 0;
}

updateUI();
newQ();
</script>

</body>
</html>
